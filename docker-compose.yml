services:
  postgres:
    image: postgres:16-alpine
    container_name: animenation-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: animenation
      POSTGRES_PASSWORD: animenation
      POSTGRES_DB: animenation
    ports:
      - "5432:5432"
    volumes:
      - animenation_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U animenation -d animenation"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  animenation_pg_data:
