services:
  # ── PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: animenation-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-animenation}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-animenation}
      POSTGRES_DB: ${POSTGRES_DB:-animenation}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - animenation_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-animenation} -d ${POSTGRES_DB:-animenation}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend API ────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: animenation-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-animenation}:${POSTGRES_PASSWORD:-animenation}@postgres:5432/${POSTGRES_DB:-animenation}?schema=public
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
      JWT_ISSUER: ${JWT_ISSUER:-animenation}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-animenation-web}
      JWT_ACCESS_TOKEN_TTL_SECONDS: ${JWT_ACCESS_TOKEN_TTL_SECONDS:-604800}
      JWT_SIGNING_SECRET: ${JWT_SIGNING_SECRET:?JWT_SIGNING_SECRET is required}
      GOOGLE_OIDC_CLIENT_ID: ${GOOGLE_OIDC_CLIENT_ID:-}
      GOOGLE_OIDC_CLIENT_SECRET: ${GOOGLE_OIDC_CLIENT_SECRET:-}
      GOOGLE_OIDC_REDIRECT_URI: ${GOOGLE_OIDC_REDIRECT_URI:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/healthz').then(r=>r.json()).then(d=>{if(!d.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    command: ["npm", "run", "start:prod"]

volumes:
  animenation_pg_data:
